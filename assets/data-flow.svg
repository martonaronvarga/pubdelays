<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Data flow through named stages</title>
  <desc id="desc">Raw XML and metadata move through named functions and stages to article shards and final outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f6c900"/></marker>
    <style>.bg{fill:#111}.file{fill:#1c1c1c;stroke:#f6c900;stroke-width:2.2;rx:12}.fn{fill:#1d241d;stroke:#9fd58a;stroke-width:2.2;rx:12}.title{font:700 24px sans-serif;fill:#fff1a8}.label{font:18px sans-serif;fill:#efe8c6}.arrow{stroke:#f6c900;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1200" height="360" rx="16"/>
  <rect class="file" x="40" y="55" width="210" height="92"/><text class="title" x="72" y="92">XML files</text><text class="label" x="72" y="120">PubMed source</text>
  <rect class="fn" x="315" y="55" width="210" height="92"/><text class="title" x="358" y="92">parse_one()</text><text class="label" x="350" y="120">stream to JSONL</text>
  <rect class="file" x="590" y="55" width="210" height="92"/><text class="title" x="638" y="92">JSONL</text><text class="label" x="624" y="120">parsed shards</text>
  <rect class="file" x="40" y="210" width="210" height="92"/><text class="title" x="72" y="247">Metadata</text><text class="label" x="72" y="275">journal + private</text>
  <rect class="fn" x="315" y="210" width="210" height="92"/><text class="title" x="350" y="247">external-all</text><text class="label" x="352" y="275">normalize tables</text>
  <rect class="file" x="590" y="210" width="210" height="92"/><text class="title" x="622" y="247">Lookups</text><text class="label" x="620" y="275">processed CSVs</text>
  <rect class="fn" x="865" y="132" width="210" height="92"/><text class="title" x="905" y="169">transform_files()</text><text class="label" x="910" y="197">filter and join</text>
  <rect class="file" x="930" y="265" width="210" height="64"/><text class="title" x="965" y="306">processed.csv</text>
  <path class="arrow" d="M250 101H315"/><path class="arrow" d="M525 101H590"/><path class="arrow" d="M250 256H315"/><path class="arrow" d="M525 256H590"/><path class="arrow" d="M800 101C842 101 842 165 865 170"/><path class="arrow" d="M800 256C842 256 842 195 865 190"/><path class="arrow" d="M970 224V265"/>
</svg>
