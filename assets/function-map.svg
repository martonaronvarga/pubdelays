<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 420" role="img" aria-labelledby="title desc">
  <title id="title">Function-level execution map</title>
  <desc id="desc">Key functions used by command dispatch, parsing, transformation, aggregation, validation, and manifest recording.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f6c900"/></marker>
    <style>.bg{fill:#111}.box{fill:#1c1c1c;stroke:#f6c900;stroke-width:2.2;rx:12}.fn{fill:#1d241d;stroke:#9fd58a;stroke-width:2.2;rx:12}.title{font:700 22px sans-serif;fill:#fff1a8}.label{font:16px sans-serif;fill:#efe8c6}.arrow{stroke:#f6c900;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1240" height="420" rx="16"/>
  <rect class="box" x="40" y="80" width="190" height="82"/><text class="title" x="92" y="116">main()</text><text class="label" x="72" y="143">CLI dispatch</text>
  <rect class="fn" x="295" y="80" width="210" height="82"/><text class="title" x="340" y="116">parse_one()</text><text class="label" x="327" y="143">XML to JSONL</text>
  <rect class="fn" x="570" y="80" width="235" height="82"/><text class="title" x="614" y="116">transform_files()</text><text class="label" x="612" y="143">filter and enrich</text>
  <rect class="fn" x="870" y="80" width="235" height="82"/><text class="title" x="910" y="116">aggregate_articles()</text><text class="label" x="920" y="143">final CSV/Parquet</text>
  <rect class="box" x="295" y="245" width="210" height="82"/><text class="title" x="338" y="281">ExternalInputs</text><text class="label" x="330" y="308">metadata paths</text>
  <rect class="box" x="570" y="245" width="235" height="82"/><text class="title" x="604" y="281">validate_shards()</text><text class="label" x="618" y="308">schema and count</text>
  <rect class="box" x="870" y="245" width="235" height="82"/><text class="title" x="920" y="281">Manifest.append()</text><text class="label" x="920" y="308">audit stage result</text>
  <path class="arrow" d="M230 121H295"/><path class="arrow" d="M505 121H570"/><path class="arrow" d="M805 121H870"/><path class="arrow" d="M400 245C430 206 520 174 570 144"/><path class="arrow" d="M688 162V245"/><path class="arrow" d="M988 162V245"/>
</svg>
