<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 300" role="img" aria-labelledby="title desc">
  <title id="title">Command execution sequence</title>
  <desc id="desc">The CLI parser selects a handler, the handler loads config, the stage writes outputs, then validation and manifest recording close the loop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f6c900"/></marker>
    <style>.bg{fill:#111}.step{fill:#1c1c1c;stroke:#f6c900;stroke-width:2.2;rx:12}.check{fill:#1d241d;stroke:#9fd58a;stroke-width:2.2;rx:12}.title{font:700 22px sans-serif;fill:#fff1a8}.label{font:16px sans-serif;fill:#efe8c6}.arrow{stroke:#f6c900;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1160" height="300" rx="16"/>
  <rect class="step" x="40" y="70" width="180" height="90"/><text class="title" x="70" y="106">build_parser()</text><text class="label" x="74" y="134">register commands</text>
  <rect class="step" x="280" y="70" width="180" height="90"/><text class="title" x="336" y="106">main()</text><text class="label" x="318" y="134">dispatch handler</text>
  <rect class="step" x="520" y="70" width="180" height="90"/><text class="title" x="580" y="106">cfg()</text><text class="label" x="558" y="134">load config</text>
  <rect class="step" x="760" y="70" width="180" height="90"/><text class="title" x="798" y="106">stage call</text><text class="label" x="798" y="134">parse / transform</text>
  <rect class="check" x="760" y="195" width="180" height="68"/><text class="title" x="790" y="237">atomic write</text>
  <rect class="check" x="520" y="195" width="180" height="68"/><text class="title" x="548" y="237">manifest row</text>
  <rect class="check" x="280" y="195" width="180" height="68"/><text class="title" x="315" y="237">validation</text>
  <path class="arrow" d="M220 115H280"/><path class="arrow" d="M460 115H520"/><path class="arrow" d="M700 115H760"/><path class="arrow" d="M850 160V195"/><path class="arrow" d="M760 229H700"/><path class="arrow" d="M520 229H460"/>
</svg>
