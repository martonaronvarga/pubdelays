<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" role="img" aria-labelledby="title desc">
  <title id="title">High-level control flow</title>
  <desc id="desc">CLI commands resolve configuration and paths, call stage functions, write outputs atomically, and append manifest rows.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f6c900"/></marker>
    <style>.bg{fill:#111}.node{fill:#1d1d1d;stroke:#f6c900;stroke-width:2;rx:12}.stage{fill:#21251e;stroke:#9fd58a;stroke-width:2;rx:12}.audit{fill:#24210f;stroke:#f6c900;stroke-width:2;rx:12}.title{font:700 16px sans-serif;fill:#f7f0c8}.label{font:13px sans-serif;fill:#e6e0bd}.arrow{stroke:#f6c900;stroke-width:2.4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1040" height="360" rx="16"/>
  <rect class="node" x="45" y="55" width="165" height="72"/><text class="title" x="78" y="88">CLI command</text><text class="label" x="72" y="110">argparse entrypoint</text>
  <rect class="node" x="270" y="55" width="165" height="72"/><text class="title" x="318" y="88">Config</text><text class="label" x="298" y="110">defaults and flags</text>
  <rect class="node" x="495" y="55" width="165" height="72"/><text class="title" x="536" y="88">Path plan</text><text class="label" x="520" y="110">input and output roots</text>
  <rect class="stage" x="720" y="55" width="185" height="72"/><text class="title" x="762" y="88">Stage function</text><text class="label" x="750" y="110">parse / transform / aggregate</text>
  <rect class="audit" x="185" y="215" width="165" height="72"/><text class="title" x="222" y="248">Atomic write</text><text class="label" x="218" y="270">temporary file then replace</text>
  <rect class="audit" x="440" y="215" width="165" height="72"/><text class="title" x="477" y="248">Manifest row</text><text class="label" x="468" y="270">success, skip, or failure</text>
  <rect class="node" x="695" y="215" width="165" height="72"/><text class="title" x="748" y="248">Validate</text><text class="label" x="726" y="270">schema and shard checks</text>
  <path class="arrow" d="M210 91H270"/><path class="arrow" d="M435 91H495"/><path class="arrow" d="M660 91H720"/><path class="arrow" d="M812 127C812 176 286 176 268 215"/><path class="arrow" d="M350 251H440"/><path class="arrow" d="M605 251H695"/>
</svg>
