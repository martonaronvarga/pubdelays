[pipeline]
manifest = "data/manifests/pipeline.sqlite"
parse_inputs = "data/manifests/parse_inputs.txt"
transform_inputs = "data/manifests/transform_inputs.txt"

[pubmed]
xml_dir = "data/raw_data/pubmed/xmls"
jsonl_dir = "data/temp_data/pubmed/jsonl"

[external.raw]
scimago_dir = "data/raw_data/scimago"
web_of_science_csv = "data/raw_data/web_of_science/wos.csv"
doaj_csv = "data/raw_data/directory_of_open_access_journals/doaj_2025_05_15.csv"
norwegian_list_csv = "data/raw_data/norwegian_publication_indicator/norwegian_list_2025_05_14.csv"
retraction_watch_csv = "data/raw_data/retraction_watch/retraction_watch.csv"
publisher_csv = "data/raw_data/publisher_metadata/publishers.csv"

[external.download]
doaj_url = "https://doaj.org/csv"
retraction_watch_url = "https://gitlab.com/crossref/retraction-watch-data/-/raw/main/retraction_watch.csv"
# SCImago's public export endpoint can return HTTP 403 to scripted clients.
# Use an institutional/internal mirror or file:// URL template that contains {year}.
scimago_url_template = ""
publisher_url = ""
# Web of Science and Norwegian Publication Indicator snapshots require licensed/manual source selection for now.

[external.processed]
scimago = "data/processed_data/scimago.csv"
web_of_science = "data/processed_data/web_of_science.csv"
doaj = "data/processed_data/doaj.csv"
norwegian_list = "data/processed_data/norwegian_list.csv"
retraction_watch = "data/processed_data/retraction_watch.csv"
publisher = "data/processed_data/publisher_metadata.csv"
pubmed_journals = "data/external/pubmed-journals.csv"

[transform]
article_shard_dir = "data/temp_data/article_parquet"
article_shard_format = "parquet"
min_received = "2013-01-01"
default_shards = 64

[aggregate]
processed_parquet = "data/processed_data/processed.parquet"
processed_csv = "data/processed_data/processed.csv"
summary_dir = "data/processed_data/summaries"

[slurm]
runner = "uv run pubdelays"
log_dir = "logs/slurm"
partition = ""
account = ""
qos = ""
max_array_size = 100

[slurm.resources.download]
cpus_per_task = 4
mem = "8G"
time = "12:00:00"

[slurm.resources.download_external]
cpus_per_task = 2
mem = "4G"
time = "02:00:00"

[slurm.resources.external_all]
cpus_per_task = 2
mem = "12G"
time = "02:00:00"

[slurm.resources.parse]
cpus_per_task = 1
mem = "6G"
time = "04:00:00"

[slurm.resources.prepare_transform]
cpus_per_task = 1
mem = "2G"
time = "00:30:00"

[slurm.resources.transform_shards]
cpus_per_task = 4
mem = "24G"
time = "06:00:00"

[slurm.resources.aggregate_all]
cpus_per_task = 4
mem = "32G"
time = "04:00:00"
