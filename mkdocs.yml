site_name: pubdelays
site_description: Reproducible PubMed/MEDLINE publication-delay pipeline
site_url: https://martonaronvarga.github.io/pubdelays/
repo_url: https://github.com/martonaronvarga/pubdelays
repo_name: martonaronvarga/pubdelays
strict: true

nav:
  - Start: index.md
  - Runbook: getting-started.md
  - Workflow:
      - Data Layout: data-layout.md
      - CLI Reference: cli.md
      - Stage Contracts: STAGE_CONTRACTS.md
      - HPC and SLURM: hpc-slurm.md
  - Reference:
      - Analysis Dataset V1: ANALYSIS_DATASET_V1.md
      - Semantic Decisions: SEMANTIC_DECISIONS.md
      - Validation and Benchmarks: VALIDATION_AND_BENCHMARKS.md
      - Pipeline Context: PIPELINE_CONTEXT.md

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: pubdelays-black
    primary: custom
    accent: yellow
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
