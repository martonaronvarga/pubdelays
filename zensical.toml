[project]
site_name = "pubdelays"
site_description = "Reproducible PubMed/MEDLINE publication-delay pipeline"
site_author = "Marton A. Varga"
site_url = "https://martonaronvarga.github.io/pubdelays/"
repo_url = "https://github.com/martonaronvarga/pubdelays"
repo_name = "martonaronvarga/pubdelays"
repo = "fontawesome/brands/git-alt"
docs_dir = "docs"
site_dir = "site"
strict = true
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/mermaid.mjs"]
extra.generator = false

nav = [
  {"Home" = "index.md"},
  {"Getting started" = [
    {"Overview" = "getting-started/index.md"},
    {"Installation" = "getting-started/installation.md"},
    {"Quickstart" = "getting-started/quickstart.md"},
    {"Configuration" = "getting-started/configuration.md"}
  ]},
  {"Concepts" = [
    {"Overview" = "concepts/index.md"},
    {"Architecture" = "concepts/architecture.md"},
    {"Data model" = "concepts/data-model.md"},
    {"Terminology" = "concepts/terminology.md"},
    {"Invariants" = "concepts/invariants.md"}
  ]},
  {"Guides" = [
    {"Overview" = "guides/index.md"},
    {"Common workflows" = "guides/common-workflows.md"},
    {"Local development" = "guides/local-development.md"},
    {"Production or HPC" = "guides/production-or-hpc.md"},
    {"Troubleshooting" = "guides/troubleshooting.md"}
  ]},
  {"Reference" = [
    {"Overview" = "reference/index.md"},
    {"CLI" = "reference/cli.md"},
    {"Configuration" = "reference/configuration.md"},
    {"File layout" = "reference/file-layout.md"},
    {"Schemas" = "reference/schemas.md"},
    {"Environment variables" = "reference/environment-variables.md"}
  ]},
  {"Internals" = [
    {"Overview" = "internals/index.md"},
    {"Pipeline" = "internals/pipeline.md"},
    {"Parser" = "internals/parser.md"},
    {"Stage contracts" = "internals/stage-contracts.md"},
    {"Validation" = "internals/validation.md"},
    {"Performance" = "internals/performance.md"},
    {"Error handling" = "internals/error-handling.md"}
  ]},
  {"Contributing" = [
    {"Overview" = "contributing/index.md"},
    {"Development" = "contributing/development.md"},
    {"Testing" = "contributing/testing.md"},
    {"Documentation" = "contributing/documentation.md"}
  ]},
  {"Maintenance" = [
    {"Documentation inventory" = "maintenance/documentation-inventory.md"},
    {"Documentation plan" = "maintenance/documentation-plan.md"}
  ]}
]

[project.theme]
logo = "assets/logo.svg"
favicon = "assets/favicon.svg"
icon.previous = "fontawesome/solid/angle-left"
icon.next = "fontawesome/solid/angle-right"

features = [
  "header.autohide",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "toc.follow",
  "navigation.top",
  "search.highlight",
  "content.code.copy",
  "content.code.select",
  "content.code.annotate"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
variant = "modern"
scheme = "slate"
primary = "amber"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
variant = "modern"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.icon.admonition]
note = "octicons/tag-16"
abstract = "octicons/checklist-16"
info = "octicons/info-16"
tip = "octicons/squirrel-16"
success = "octicons/check-16"
question = "octicons/question-16"
warning = "octicons/alert-16"
failure = "octicons/x-circle-16"
danger = "octicons/zap-16"
bug = "octicons/bug-16"
example = "octicons/beaker-16"
quote = "octicons/quote-16"

[project.font]
text = "Lexend, Tinos, Roboto, serif"
code = "Red Hat Mono, 'Courier New', monospace"

[project.validation]
unresolved_references = true
unresolved_footnotes = true
unused_definitions = true
unused_footnotes = true
shadowed_definitions = true
shadowed_footnotes = true
invalid_links = true
invalid_link_anchors = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"}
]

[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.abbr]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
